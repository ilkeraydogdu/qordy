name: qordy_app
description: QORDY Restaurant Management App
publish_to: 'none'
version: 1.8.2+28

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0

  # Dependency Injection
  get_it: ^8.0.3

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.71.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  connectivity_plus: ^6.1.4
  crypto: ^3.0.6
  # 2FA TOTP (Google Authenticator uyumlu) + QR üretimi
  otp: ^3.1.4
  qr_flutter: ^4.1.0

  # Icons
  material_design_icons_flutter: ^7.0.7296

  # Web / Payment
  webview_flutter: ^4.10.0

  # Push Notifications (FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/qordy_logo.png
    - assets/images/qordy_logo_light.png
    - assets/icons/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0E2F55"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
