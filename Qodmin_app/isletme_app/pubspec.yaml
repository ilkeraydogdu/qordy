name: isletme_yonetici
description: "Qordy Isletme Yonetici - Android only, Material 3, Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
 sdk: ^3.7.2

dependencies:
 flutter: { sdk: flutter }

 # State management
 flutter_bloc: ^8.1.6
 bloc: ^8.1.4
 equatable: ^2.0.5

 # Dependency injection
 get_it: ^7.7.0
 injectable: ^2.4.4

 # Networking
 dio: ^5.7.0
 web_socket_channel: ^3.0.0

 # Secure storage
 flutter_secure_storage: ^9.2.2

 # Security
 http_certificate_pinning: ^2.0.0
 flutter_jailbreak_detection: ^1.10.0

 # Routing & UI
 go_router: ^14.6.1
 google_fonts: ^6.2.1
 formz: ^0.7.0
 intl: ^0.19.0
 fl_chart: ^0.69.0
 flutter_svg: ^2.0.10

 # Push notifications
 firebase_core: ^3.8.0
 firebase_messaging: ^15.1.5
 flutter_local_notifications: ^17.2.3

 # Functional & utilities
 dartz: ^0.10.1
 connectivity_plus: ^6.1.0
 package_info_plus: ^8.0.2
 uuid: ^4.5.1

dev_dependencies:
 flutter_test: { sdk: flutter }
 bloc_test: ^9.1.7
 mocktail: ^1.0.4
 injectable_generator: ^2.6.2
 build_runner: ^2.4.13
 flutter_lints: ^5.0.0

flutter:
 uses-material-design: true
 assets:
 - assets/
